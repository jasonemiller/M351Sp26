<span class="type">Definition</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">209</span><span class="period heading-divison-mark heading-divison-mark__period">.</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="title">Continuity at a point.</span>
</h5>
<div class="para">A function <span class="process-math">\(f:A \rightarrow \mathbb{R}\)</span> is continuous at a point <span class="process-math">\(c \in A\)</span> if, for all <span class="process-math">\(\epsilon &gt; 0\)</span> there exists a <span class="process-math">\(\delta &gt; 0\)</span> such that whenever <span class="process-math">\(|x-c| &lt; \delta\)</span> (and <span class="process-math">\(a \in A\)</span>) it follows that <span class="process-math">\(|f(x)-f(c)| &lt; \epsilon\text{.}\)</span><div class="autopermalink" data-description="Paragraph"><a href="#def-cts-2-1" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
